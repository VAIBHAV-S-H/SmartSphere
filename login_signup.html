<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Signup</title>
    <link rel="stylesheet" href="login_signup.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <img src="/assets/logo.png" alt="Logo" class="logo">
            <div class="illustration">
                <img src="/assets/login_signup_illustration.png" alt="Illustration" id="illustration-image">
            </div>
        </div>
        <div class="right-section">
            <!-- Signup Form -->
            <div id="signup-form">
                <h2>Register your account here</h2>
                <form>
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Name" required>
                    
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="YourMail@gmail.com" required>
                    
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="********" required>
                    
                    <div class="links">
                        <a href="#">privacy policy & terms</a>
                    </div>
                    <button type="submit" class="btn">SIGN UP</button>
                </form>
                <p>Already have an account? <a href="#" onclick="switchToLogin()">Sign in instead</a></p>
            </div>
            
            <!-- Login Form -->
            <div id="login-form" style="display: none;">
                <h2>Welcome to Smart Sphere</h2>
                <form>
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="YourMail@gmail.com" required>
                    
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="********" required>
                    
                    <button type="submit" class="btn">LOGIN</button>
                </form>
                <p>New on our platform? <a href="#" onclick="switchToSignup()">Create an account</a></p>
                <p>or login with</p>
                <div class="social-icons">
                    <a href="#"><img src="/assets/lin.png" alt="LinkedIn"></a>
                    <a href="#"><img src="/assets/fb.png" alt="Facebook"></a>
                    <a href="#"><img src="/assets/google.png" alt="Google"></a>
                </div>
            </div>
        </div>
    </div>
    <script src="login_signup.js"></script>
</body>
</html>
